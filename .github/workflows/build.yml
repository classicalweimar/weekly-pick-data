name: Encrypt & Deploy Content

# 개발계획서 3.1 / 5.3:
#  - src/ 평문 push → AES 암호화 → public/(.enc) 만 GitHub Pages 로 배포
#  - 배포 후 FCM 토픽으로 업데이트 알림 발송(선택)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'static/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Encrypt content (src → public)
        env:
          # ⚠️ 저장소 Settings → Secrets 에 CONTENT_AES_KEY (Base64 32바이트) 등록 필요.
          #    앱의 weeklypick.contentAesKey 와 반드시 동일한 값.
          CONTENT_AES_KEY: ${{ secrets.CONTENT_AES_KEY }}
        run: node scripts/encrypt.mjs src public

      # Pages 사이트를 활성화/구성한다. enablement: true 이면 아직 활성화돼 있지 않아도
      # API 로 자동 활성화한다 → "Failed to create deployment (404)" 방지.
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      # GitHub Pages 는 간헐적으로 배포가 deployment_queued 에서 안 풀리거나
      # "try again later" 를 반환한다(플랫폼 일시 장애). 한 번 재시도해 흡수한다.
      - name: Deploy to GitHub Pages (1차)
        id: deploy
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Deploy to GitHub Pages (재시도)
        id: deploy_retry
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: 배포 재시도도 실패하면 run 실패 처리
        if: steps.deploy.outcome == 'failure' && steps.deploy_retry.outcome == 'failure'
        run: |
          echo "::error::Pages 배포가 재시도 후에도 실패"
          exit 1

      - name: Notify via FCM (optional)
        # FCM_SA_KEY 가 비어 있으면 notify.mjs 가 스스로 건너뛴다.
        # 이번 push 에서 바뀐 콘텐츠의 (국가,카테고리)별로 타겟 발송한다(GITHUB_EVENT_PATH 자동 제공).
        env:
          # FCM HTTP v1: 서비스 계정 JSON 을 Base64 로 인코딩해 Secret 에 저장.
          FCM_SA_KEY: ${{ secrets.FCM_SERVICE_ACCOUNT_BASE64 }}
        run: node scripts/notify.mjs
