name: Encrypt & Deploy Content

# 개발계획서 3.1 / 5.3:
#  - src/ 평문 push → AES 암호화 → public/(.enc) 만 GitHub Pages 로 배포
#  - 배포 후 FCM 토픽으로 업데이트 알림 발송(선택)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Encrypt content (src → public)
        env:
          # ⚠️ 저장소 Settings → Secrets 에 CONTENT_AES_KEY (Base64 32바이트) 등록 필요.
          #    앱의 weeklypick.contentAesKey 와 반드시 동일한 값.
          CONTENT_AES_KEY: ${{ secrets.CONTENT_AES_KEY }}
        run: node scripts/encrypt.mjs src public

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Notify via FCM (optional)
        # FCM_SA_KEY 가 비어 있으면 notify.mjs 가 스스로 건너뛴다.
        env:
          # FCM HTTP v1: 서비스 계정 JSON 을 Base64 로 인코딩해 Secret 에 저장.
          FCM_SA_KEY: ${{ secrets.FCM_SERVICE_ACCOUNT_BASE64 }}
          FCM_TOPIC: updates
        run: node scripts/notify.mjs
