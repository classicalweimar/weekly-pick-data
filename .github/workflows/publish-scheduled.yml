name: Scheduled Publish (promote → encrypt → deploy → notify)

# 예약 발행. 데스크톱 도구가 staging/ 에 올려둔 콘텐츠 중 publishAt(예약 시각)이
# 지난 것을 promote.mjs 가 src/ 로 옮긴 뒤, build.yml 과 동일하게 암호화·배포·알림한다.
#
# 왜 이 워크플로우가 발행 전 과정을 직접 하나:
#   promote 가 src 를 커밋·push 하더라도, 그 push 는 GITHUB_TOKEN 으로 이뤄지므로
#   push 트리거(build.yml)를 다시 트리거하지 않는다(Actions 무한루프 방지 정책).
#   따라서 여기서 encrypt → Pages 배포 → notify 까지 이어서 수행한다.

on:
  schedule:
    # 10분마다(UTC). GitHub schedule 은 최소 5분 주기이며 부하 시 수~십수 분 지연될 수 있다.
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write   # promote 결과(src 갱신, staging 삭제)를 커밋·push
  pages: write
  id-token: write

concurrency:
  # build.yml 의 Pages 배포와 같은 그룹 — 동시 배포 충돌 방지.
  # 진행 중인 배포를 취소하지 않도록 cancel-in-progress 는 false.
  group: pages
  cancel-in-progress: false

jobs:
  promote-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # promote → commit → push 를 한 스텝에서 "원격 최신 재계산 + push 재시도"로 처리한다.
      # 업로더는 예약 파일을 GitHub Contents API 로 파일마다 개별 커밋하므로, 체크아웃~push
      # 사이에 main 이 앞서 나가 push 가 non-fast-forward(! [rejected] ... fetch first)로 거부되는
      # 경합이 잦았다(발행이 조용히 실패 → 콘텐츠가 staging 에 남고 앱엔 안 뜸).
      # 그래서 매 시도마다 origin/main 으로 hard reset 해 promote 를 다시 계산하고(다른 run 이
      # 이미 발행했으면 due 0건이라 자연 종료) push 를 재시도한다. promote 는 멱등이라 안전하다.
      - name: Promote due content (staging → src) and push
        id: promote
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          changed=false
          targets='[]'
          had_work=false
          for attempt in 1 2 3 4 5; do
            git fetch --quiet origin main
            git reset --quiet --hard origin/main
            node scripts/promote.mjs staging src
            if [ -z "$(git status --porcelain src staging)" ]; then
              echo "발행할 예약 콘텐츠가 없습니다(경합 후 다른 run 이 처리했을 수 있음)."
              break
            fi
            had_work=true
            # promote 가 남긴 알림 대상(JSON 한 줄). 없으면 빈 배열.
            targets="$(cat promote-targets.json 2>/dev/null || echo '[]')"
            git add -A src staging
            git commit -q -m "chore(publish): 예약 콘텐츠 발행 (promote)"
            if git push origin HEAD:main; then
              changed=true
              break
            fi
            echo "::warning::push 경합 감지 — 재시도 ${attempt}/5"
            sleep $((attempt * 3))
          done
          if [ "$changed" != 'true' ] && [ "$had_work" = 'true' ]; then
            echo "::error::5회 재시도 후에도 발행 push 실패 — 다음 주기에 재시도됩니다."
            exit 1
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

      - name: Encrypt content (src → public)
        if: steps.promote.outputs.changed == 'true'
        env:
          # build.yml 과 동일한 키. 저장소 Settings → Secrets 의 CONTENT_AES_KEY(Base64 32B).
          CONTENT_AES_KEY: ${{ secrets.CONTENT_AES_KEY }}
        run: node scripts/encrypt.mjs src public

      - name: Setup Pages
        if: steps.promote.outputs.changed == 'true'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        if: steps.promote.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      # GitHub Pages 는 간헐적으로 배포가 deployment_queued 에서 안 풀리거나
      # "try again later" 를 반환한다(플랫폼 일시 장애). 한 번 재시도해 흡수한다.
      # 재시도는 이 run 에 이미 업로드된 github-pages 아티팩트를 그대로 재사용한다.
      - name: Deploy to GitHub Pages (1차)
        id: deploy
        if: steps.promote.outputs.changed == 'true'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Deploy to GitHub Pages (재시도)
        id: deploy_retry
        if: steps.promote.outputs.changed == 'true' && steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: 배포 재시도도 실패하면 run 실패 처리
        if: steps.promote.outputs.changed == 'true' && steps.deploy.outcome == 'failure' && steps.deploy_retry.outcome == 'failure'
        run: |
          echo "::error::Pages 배포가 재시도 후에도 실패 — 다음 발행 시 재배포되거나 build.yml 수동 실행 필요"
          exit 1

      - name: Notify via FCM (optional)
        if: steps.promote.outputs.changed == 'true'
        # push 이벤트가 없으므로 promote 가 만든 대상 목록을 NOTIFY_TARGETS 로 직접 넘긴다.
        # FCM_SA_KEY 가 비어 있으면 notify.mjs 가 스스로 건너뛴다.
        env:
          FCM_SA_KEY: ${{ secrets.FCM_SERVICE_ACCOUNT_BASE64 }}
          NOTIFY_TARGETS: ${{ steps.promote.outputs.targets }}
        run: node scripts/notify.mjs
